<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guess the Number</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --border: #2a2a3a;
      --accent: #7c6dfa; --accent2: #fa6d9a;
      --text: #f0f0fa; --muted: #6b6b8a;
      --low: #fa8c6d; --high: #6dcffa; --win: #6dfa9a;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 2rem;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(124,109,250,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,109,250,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridMove 20s linear infinite; pointer-events: none;
    }
    @keyframes gridMove { 0% { transform: translateY(0); } 100% { transform: translateY(48px); } }
    .glow-orb { position: fixed; width: 500px; height: 500px; border-radius: 50%; filter: blur(120px); pointer-events: none; opacity: 0.15; }
    .glow-orb.one { background: var(--accent); top: -100px; left: -100px; }
    .glow-orb.two { background: var(--accent2); bottom: -100px; right: -100px; }
    .card {
      position: relative; background: var(--surface);
      border: 1px solid var(--border); border-radius: 24px;
      padding: 2.5rem; width: 100%; max-width: 480px; z-index: 1;
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--accent); background: rgba(124,109,250,0.1);
      border: 1px solid rgba(124,109,250,0.25); border-radius: 99px;
      padding: 4px 12px; margin-bottom: 1.25rem;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .badge::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); animation: pulse 2s ease infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
    h1 { font-size: 2rem; font-weight: 800; line-height: 1.1; margin-bottom: 0.4rem; }
    h1 span { color: var(--accent); }
    .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 2rem; font-family: 'DM Mono', monospace; }
    .attempts-row { display: flex; gap: 8px; margin-bottom: 1.75rem; align-items: center; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); border: 1px solid #3a3a4a; transition: all 0.3s ease; }
    .dot.used { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .dot.win  { background: var(--win);    border-color: var(--win);    box-shadow: 0 0 8px var(--win); }
    .dot.lose { background: var(--accent2);border-color: var(--accent2);box-shadow: 0 0 8px var(--accent2); }
    .attempts-label { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
    .range-bar {
      background: #1a1a28; border: 1px solid var(--border); border-radius: 12px;
      padding: 12px 16px; display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 1.5rem;
      font-family: 'DM Mono', monospace; font-size: 13px;
    }
    .range-val { color: var(--text); font-weight: 500; }
    .range-hint { color: var(--accent); font-size: 12px; }
    .input-group { display: flex; gap: 10px; margin-bottom: 1.25rem; }
    input[type="number"] {
      flex: 1; background: #1a1a28; border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 1.1rem;
      padding: 14px 18px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,109,250,0.15); }
    input[type="number"]:disabled { opacity: 0.4; cursor: not-allowed; }
    button.guess-btn {
      background: var(--accent); color: #fff; border: none; border-radius: 12px;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
      padding: 14px 22px; cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s; white-space: nowrap;
    }
    button.guess-btn:hover:not(:disabled) { background: #9380fc; box-shadow: 0 4px 20px rgba(124,109,250,0.4); }
    button.guess-btn:active:not(:disabled) { transform: scale(0.97); }
    button.guess-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .hint {
      border-radius: 12px; padding: 12px 16px;
      font-family: 'DM Mono', monospace; font-size: 13px;
      margin-bottom: 1.25rem; display: none;
      animation: slideIn 0.3s ease both;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .hint.low  { background: rgba(250,140,109,0.1); border: 1px solid rgba(250,140,109,0.3); color: var(--low); }
    .hint.high { background: rgba(109,207,250,0.1); border: 1px solid rgba(109,207,250,0.3); color: var(--high); }
    .hint.win  { background: rgba(109,250,154,0.1); border: 1px solid rgba(109,250,154,0.3); color: var(--win); }
    .hint.lose { background: rgba(250,109,154,0.1); border: 1px solid rgba(250,109,154,0.3); color: var(--accent2); }
    .history-title { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; display: none; }
    .history-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill { font-family: 'DM Mono', monospace; font-size: 12px; padding: 4px 12px; border-radius: 99px; animation: popIn 0.2s ease both; }
    @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .pill.low  { background: rgba(250,140,109,0.12); color: var(--low);  border: 1px solid rgba(250,140,109,0.25); }
    .pill.high { background: rgba(109,207,250,0.12); color: var(--high); border: 1px solid rgba(109,207,250,0.25); }
    .pill.win  { background: rgba(109,250,154,0.12); color: var(--win);  border: 1px solid rgba(109,250,154,0.25); }
    .play-again { margin-top: 1.5rem; display: none; }
    button.restart-btn {
      width: 100%; background: transparent; color: var(--text);
      border: 1px solid var(--border); border-radius: 12px;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
      padding: 14px; cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.1s;
    }
    button.restart-btn:hover { border-color: var(--accent); background: rgba(124,109,250,0.08); }
    button.restart-btn:active { transform: scale(0.98); }
    .loading {
      text-align: center; padding: 2rem;
      font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted);
    }
    .cpp-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: #6dfa9a; background: rgba(109,250,154,0.08);
      border: 1px solid rgba(109,250,154,0.2); border-radius: 99px;
      padding: 4px 12px; margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="glow-orb one"></div>
  <div class="glow-orb two"></div>

  <div class="card" id="card">
    <div id="loading" class="loading">Loading C++ engine...</div>
    <div id="game-content" style="display:none;">
      <div class="badge">number game</div>
      <h1>Guess the <span>Number</span></h1>
      <p class="subtitle" id="subtitle">pick a number between 1 and 100</p>
      <div class="attempts-row" id="dots-row">
        <span class="attempts-label" id="att-label">7 / 7 left</span>
      </div>
      <div class="range-bar">
        <span class="range-val" id="r-low">1</span>
        <span class="range-hint" id="r-hint">try anywhere</span>
        <span class="range-val" id="r-high">100</span>
      </div>
      <div class="input-group">
        <input type="number" id="inp" min="1" max="100" placeholder="your guess..." />
        <button class="guess-btn" id="guess-btn" onclick="submitGuess()">Go →</button>
      </div>
      <div class="hint" id="hint"></div>
      <div>
        <p class="history-title" id="hist-title">previous guesses</p>
        <div class="history-pills" id="pills"></div>
      </div>
      <div class="play-again" id="play-again">
        <button class="restart-btn" onclick="resetGame()">↺ Play Again</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
  <script>
    const MAX = 7;
    let guesses = [], rLow = 1, rHigh = 100, over = false;

    Module.onRuntimeInitialized = function() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('game-content').style.display = 'block';
      resetGame();
    };

    function resetGame() {
      Module.ccall('new_game', null, [], []);
      guesses = []; rLow = 1; rHigh = 100; over = false;

      document.getElementById('inp').value = '';
      document.getElementById('inp').disabled = false;
      document.getElementById('guess-btn').disabled = false;
      document.getElementById('hint').style.display = 'none';
      document.getElementById('pills').innerHTML = '';
      document.getElementById('hist-title').style.display = 'none';
      document.getElementById('play-again').style.display = 'none';
      document.getElementById('subtitle').textContent = 'pick a number between 1 and 100';
      document.getElementById('r-low').textContent = '1';
      document.getElementById('r-high').textContent = '100';
      document.getElementById('r-hint').textContent = 'try anywhere';
      document.getElementById('att-label').textContent = '7 / 7 left';
      renderDots();
      document.getElementById('inp').focus();
    }

    function renderDots() {
      const row = document.getElementById('dots-row');
      const label = document.getElementById('att-label');
      row.querySelectorAll('.dot').forEach(d => d.remove());
      const attempts = Module.ccall('get_attempts', 'number', [], []);
      const left = MAX - attempts;
      for (let i = 0; i < MAX; i++) {
        const d = document.createElement('div');
        d.className = 'dot';
        if (i < attempts) {
          if (over && guesses[guesses.length-1] === 0)
            d.className = 'dot ' + (i === attempts - 1 ? 'win' : 'used');
          else if (over)
            d.className = 'dot lose';
          else
            d.className = 'dot used';
        }
        row.insertBefore(d, label);
      }
      label.textContent = left + ' / ' + MAX + ' left';
    }

    function showHint(msg, type) {
      const h = document.getElementById('hint');
      h.textContent = msg;
      h.className = 'hint ' + type;
      h.style.display = 'block';
      h.style.animation = 'none';
      h.offsetHeight;
      h.style.animation = '';
    }

    function addPill(val, type) {
      document.getElementById('hist-title').style.display = 'block';
      const p = document.createElement('span');
      p.className = 'pill ' + type;
      p.textContent = val + (type === 'low' ? ' ↑' : type === 'high' ? ' ↓' : ' ✓');
      document.getElementById('pills').appendChild(p);
    }

    function submitGuess() {
      if (over) return;
      const inp = document.getElementById('inp');
      const val = parseInt(inp.value);
      if (isNaN(val) || val < 1 || val > 100) {
        showHint('Enter a number between 1 and 100.', 'lose');
        return;
      }

      // Call C++ function!
      const result = Module.ccall('make_guess', 'number', ['number'], [val]);
      const attempts = Module.ccall('get_attempts', 'number', [], []);
      const left = MAX - attempts;
      inp.value = '';

      if (result === 0) {
        over = true;
        guesses.push(0);
        addPill(val, 'win');
        showHint('Correct! The number was ' + val + '. Got it in ' + attempts + ' attempt' + (attempts > 1 ? 's' : '') + '!', 'win');
        document.getElementById('inp').disabled = true;
        document.getElementById('guess-btn').disabled = true;
        document.getElementById('play-again').style.display = 'block';
        renderDots();
        return;
      }

      if (attempts >= MAX && result !== 0) {
        over = true;
        guesses.push(result);
        const secret = Module.ccall('get_secret', 'number', [], []);
        addPill(val, result === -1 ? 'low' : 'high');
        showHint('Out of attempts! The number was ' + secret + '.', 'lose');
        document.getElementById('inp').disabled = true;
        document.getElementById('guess-btn').disabled = true;
        document.getElementById('play-again').style.display = 'block';
        renderDots();
        return;
      }

      if (result === -1) {
        rLow = Math.max(rLow, val + 1);
        guesses.push(-1);
        addPill(val, 'low');
        showHint('Too low! ' + left + ' attempt' + (left > 1 ? 's' : '') + ' remaining.', 'low');
      } else {
        rHigh = Math.min(rHigh, val - 1);
        guesses.push(1);
        addPill(val, 'high');
        showHint('Too high! ' + left + ' attempt' + (left > 1 ? 's' : '') + ' remaining.', 'high');
      }

      document.getElementById('r-low').textContent = rLow;
      document.getElementById('r-high').textContent = rHigh;
      const mid = Math.floor((rLow + rHigh) / 2);
      document.getElementById('r-hint').textContent = 'try around ' + mid;
      renderDots();
      inp.focus();
    }

    document.getElementById('inp').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitGuess();
    });
  </script>
</body>
</html>
